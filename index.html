<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Miner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="topDisplay">
        <h2 id="name">Solar Miner</h2>
        <div id="rightSide">
            <h2 id="crystalDisplay">Crystals: 0</h2>
            <h2 id="passiveIncome">Passive/sec: 0</h2>
        </div>
    </nav>
    <main>
        <section id="mainAstroid">
            <img id="astroid"src="images/astroid.png" width="350px" height="auto">
            <h3>(Click to mine)</h3>
        </section>
        <section id="shop">
            <h2>UPGRADES SHOP</h2>
            <div id="upgrades">
                <section id="upgrade1">
                    <h3>Mining Drill</h3>
                    <h3 id="cost1">Cost: 50 (0/25)</h3>
                    <button id="upgradeBtn1">Buy</button>
                </section>
                <section id="upgrade2">
                    <h3>Auto Miner</h3>
                    <h3 id="cost2">Cost: 250 (0/25)</h3>
                    <button id="upgradeBtn2">Buy</button>
                </section>
                <section id="upgrade3">
                    <h3>Laser Extractor</h3>
                    <h3 id="cost3">Cost: 750 (0/25)</h3>
                    <button id="upgradeBtn3">Buy</button>
                </section>
                <section id="upgrade4">
                    <h3>Mining Drone</h3>
                    <h3 id="cost4">Cost: 2K (0/25)</h3>
                    <button id="upgradeBtn4">Buy</button>
                </section>
                <section id="upgrade5">
                    <h3>Quantum Harvester</h3>
                    <h3 id="cost5">Cost: 10K (0/25)</h3>
                    <button id="upgradeBtn5">Buy</button>
                </section>
                <section id="upgrade6">
                    <h3>Solar Core Reactor</h3>
                    <h3 id="cost6">Cost: 100K (0/20)</h3>
                    <button id="upgradeBtn6">Buy</button>
                </section>
            </div>
        </section>
    </main>
</body>
<script src="script.js"></script>
</html>
